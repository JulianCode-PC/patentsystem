<!DOCTYPE html>
<html>
<head>
    <title>編輯案件 - {{ case.case_no }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body class="container mt-4">

<div class="mb-3">
    <a href="/cases/{{ case.id }}" class="btn btn-outline-secondary">← 返回案件詳情</a>
</div>

<div class="card">
    <div class="card-header bg-warning">
        <h4><i class="bi bi-pencil"></i> 編輯案件 - {{ case.case_no }}</h4>
    </div>
    <div class="card-body">
        <form action="/cases/{{ case.id }}/edit" method="post">
            <!-- 案號 -->
            <div class="mb-3">
                <label class="form-label">案號</label>
                <input type="text" class="form-control" name="case_no" value="{{ case.case_no }}" required>
            </div>
            
            <!-- 專利名稱 -->
            <div class="mb-3">
                <label class="form-label">專利名稱</label>
                <input type="text" class="form-control" name="title" value="{{ case.title }}" required>
            </div>
            
            <!-- 申請人 -->
            <div class="mb-3">
                <label class="form-label">申請人</label>
                <input type="text" class="form-control" name="applicant" value="{{ case.applicant or '' }}">
            </div>
            
            <!-- 申請日 -->
            <div class="mb-3">
                <label class="form-label">申請日</label>
                <input type="date" class="form-control" name="filing_date" 
                       value="{{ case.filing_date.strftime('%Y-%m-%d') if case.filing_date else '' }}">
            </div>
            
            <!-- 狀態 -->
            <div class="mb-3">
                <label class="form-label">狀態</label>
                <select class="form-select" name="status">
                    <option value="進行中" {% if case.status == '進行中' %}selected{% endif %}>進行中</option>
                    <option value="已結案" {% if case.status == '已結案' %}selected{% endif %}>已結案</option>
                </select>
            </div>
            
            <!-- 案件截止日 -->
            <div class="mb-3">
                <label class="form-label">案件截止日</label>
                <input type="date" class="form-control" name="deadline" 
                       value="{{ case.deadline.strftime('%Y-%m-%d') if case.deadline else '' }}">
                <small class="text-muted">留空表示無案件期限</small>
            </div>
            
            <button type="submit" class="btn btn-success">
                <i class="bi bi-check-lg"></i> 儲存修改
            </button>
            <a href="/cases/{{ case.id }}" class="btn btn-secondary">取消</a>
        </form>
    </div>
</div>

</body>
</html>
