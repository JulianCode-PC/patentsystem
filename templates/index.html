<!DOCTYPE html>
<html>
<head>
    <title>專利案件文件管理</title>
</head>
<body>
    <h1>案件文件管理</h1>

    <h2>選擇案件上傳文件</h2>
    <form id="uploadForm" enctype="multipart/form-data">
        <select name="case_id" id="caseSelect">
            {% for case in cases %}
                <option value="{{ case.id }}">{{ case.title }} (ID: {{ case.id }})</option>
            {% endfor %}
        </select>
        <input type="file" name="file" required>
        <button type="submit">上傳文件</button>
    </form>

    <h2>文件列表</h2>
    <ul id="fileList">
    </ul>

    <script>
        const form = document.getElementById("uploadForm");
        const fileList = document.getElementById("fileList");
        const caseSelect = document.getElementById("caseSelect");

        async function loadFiles(caseId) {
            fileList.innerHTML = "";
            const res = await fetch(`/documents/case/${caseId}`);
            const files = await res.json();
            files.forEach(f => {
                const li = document.createElement("li");
                li.innerHTML = `${f.filename} - <a href="/documents/download/${f.id}" target="_blank">下載</a>`;
                fileList.appendChild(li);
            });
        }

        caseSelect.addEventListener("change", () => {
            loadFiles(caseSelect.value);
        });

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const caseId = caseSelect.value;
            const fileInput = form.querySelector("input[type=file]").files[0];
            const formData = new FormData();
            formData.append("file", fileInput);

            const res = await fetch(`/documents/upload/${caseId}`, {
                method: "POST",
                body: formData
            });

            if (res.ok) {
                alert("上傳成功！");
                loadFiles(caseId);
            } else {
                const err = await res.json();
                alert("上傳失敗: " + err.detail);
            }
        });

        // 頁面載入時先讀取第一個案件文件
        if(caseSelect.value) {
            loadFiles(caseSelect.value);
        }
    </script>
</body>
</html>
