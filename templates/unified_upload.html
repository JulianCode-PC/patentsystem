<!DOCTYPE html>
<html>
<head>
    <title>統一上傳文件</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="bi bi-cloud-upload"></i> 統一上傳文件</h1>
    <a href="/cases" class="btn btn-outline-secondary">← 返回儀表板</a>
</div>

<div class="card">
    <div class="card-header bg-primary text-white">
        <h5 class="mb-0">上傳 PDF 文件（自動對應案件）</h5>
    </div>
    <div class="card-body">
        <form action="/documents/upload" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">選擇 PDF 文件</label>
                <input type="file" class="form-control" name="file" accept=".pdf" required>
                <small class="text-muted">
                    <i class="bi bi-info-circle"></i> 
                    系統會自動讀取申請案號，對應到正確的案件
                </small>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-upload"></i> 上傳並自動對應
            </button>
        </form>
    </div>
</div>

</body>
</html>
